<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Organization Registry</title>
<style>
    body {font-family: Arial; display:flex; justify-content:center; padding:40px; background:#f7f7f7;}
    .box {width:400px; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
    input {width:100%; padding:10px; margin:6px 0; border-radius:6px; border:1px solid #ccc;}
    button {width:100%; padding:10px; background:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:10px;}
    button:hover {background:#43a047;}
    .item {padding:10px; background:#e9e9e9; border-radius:6px; margin-top:8px;}
</style>
</head>
<body>

<div class="box">
    <h2>🏢 Organization Registry</h2>

    <input id="search" placeholder="Search by name..." onkeyup="render()">

    <h3>Add New</h3>
    <input id="name" placeholder="Name">
    <input id="orgid" placeholder="ID">
    <input id="phone" placeholder="Phone">
    <input id="pass" placeholder="Password">
    <button onclick="addOrg()">➕ Add</button>

    <h3>Organizations</h3>
    <div id="list"></div>
</div>

<script>
// Load from localStorage
let orgs = JSON.parse(localStorage.getItem("orgs") || "[]");

// Save function
function save(){
    localStorage.setItem("orgs", JSON.stringify(orgs));
}

// Add new organization
function addOrg(){
    const name = document.getElementById("name").value.trim();
    const id = document.getElementById("orgid").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const pass = document.getElementById("pass").value.trim();

    if(name === "" || phone === ""){
        alert("⚠ Name & Phone are required");
        return;
    }

    orgs.push({name, id, phone, pass});
    save();
    render();

    // Clear inputs
    document.getElementById("name").value="";
    document.getElementById("orgid").value="";
    document.getElementById("phone").value="";
    document.getElementById("pass").value="";
}

// Render list
function render(){
    const q = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("list");
    list.innerHTML="";

    orgs.filter(o=>o.name.toLowerCase().includes(q))
        .forEach(o=>{
            list.innerHTML += `
            <div class="item">
                <b>${o.name}</b><br>
                ID: ${o.id}<br>
                📞 ${o.phone}<br>
                🔐 ${o.pass}
            </div>`;
        });
}

render();
</script>

</body>
</html>
